services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
      - "7878:7878"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - INTERFACEAI_DB_PASSWORD=${INTERFACEAI_DB_PASSWORD}
      - MEM0_AGENT_ID=${MEM0_AGENT_ID}

  vision-ai:
    build: ./vision-ai
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:5000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "6000:6000"
    profiles:
      - vision
