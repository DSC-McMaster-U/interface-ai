services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
      - "7878:7878"
    volumes:
      - type: bind
        source: ./backend
        target: /app
    environment:
      - PYTHONUNBUFFERED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - INTERFACEAI_DB_PASSWORD=${INTERFACEAI_DB_PASSWORD}
      - DB_HOST=postgres
      - DB_NAME=interfaceai-db
      - DB_USER=postgres
      - DB_SSLMODE=disable
      - MEM0_AGENT_ID=${MEM0_AGENT_ID}
    depends_on:
      - postgres

  vision-ai:
    build: ./vision-ai
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:5000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "6000:6000"
    profiles:
      - vision

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${INTERFACEAI_DB_PASSWORD}
      - POSTGRES_DB=interfaceai-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
